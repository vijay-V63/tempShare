<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TempShare</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <div class="max-w-6xl mx-auto p-4 md:p-8">
    <div class="text-center mb-10">
      <h1 class="text-5xl font-bold text-indigo-600" style="text-align: left;">TempShare</h1>
      <p class="text-gray-600 mt-2" style="text-align: left;">Temporary sharing • Expires in 30 minutes</p>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
      <!-- Create -->
      <div class="bg-white rounded-3xl shadow-xl p-8">
        <h2 class="text-2xl font-semibold mb-6">Create Share</h2>
        <form id="createForm" class="space-y-6">
          <textarea id="text" rows="10" class="w-full border border-gray-300 rounded-2xl p-5 focus:outline-none focus:border-indigo-500 resize-none" placeholder="Paste your text here..."></textarea>
          <div>
            <label class="block text-sm font-medium mb-2">Attach File (Optional)</label>
            <input type="file" id="file" class="w-full text-sm">
          </div>
          <button type="submit" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-semibold text-lg hover:bg-indigo-700">Generate Code</button>
        </form>
        <div id="createResult" class="hidden mt-8 p-6 bg-green-50 border border-green-200 rounded-2xl text-center"></div>
      </div>

      <!-- Retrieve -->
      <div class="bg-white rounded-3xl shadow-xl p-8">
        <h2 class="text-2xl font-semibold mb-6">Retrieve Share</h2>
        <div class="flex gap-3">
          <input id="codeInput" maxlength="8" placeholder="Enter code" class="flex-1 border border-gray-300 rounded-2xl px-6 py-4 text-center font-mono focus:outline-none focus:border-indigo-500">
          <button onclick="retrieveContent()" class="px-10 bg-gray-900 text-white rounded-2xl font-medium hover:bg-black">Retrieve</button>
        </div>
        <div id="retrieveResult" class="mt-8 min-h-[300px]"></div>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('createForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const text = document.getElementById('text').value.trim();
      const formData = new FormData();
      if (text) formData.append('text', text);
      const file = document.getElementById('file').files[0];
      if (file) formData.append('file', file);

      const res = await fetch('/api/create', { method: 'POST', body: formData });
      const data = await res.json();

      if (data.success) {
        document.getElementById('createResult').innerHTML = `
          <p class="text-4xl font-mono tracking-widest mb-4">${data.code}</p>
          <p class="text-sm text-gray-600">Share this code</p>
        `;
        document.getElementById('createResult').classList.remove('hidden');
      }
    });

    async function retrieveContent() {
      const code = document.getElementById('codeInput').value.trim().toUpperCase();
      if (code.length < 6) return alert("Please enter a valid code");

      const resultDiv = document.getElementById('retrieveResult');
      resultDiv.innerHTML = `<p class="text-center py-10">Loading...</p>`;

      try {
        const res = await fetch(`/api/retrieve/${code}`);
        const data = await res.json();
        let html = `<div class="p-6 bg-gray-50 rounded-2xl">`;
        if (data.text) html += `<pre class="whitespace-pre-wrap">${data.text}</pre>`;
        if (data.file_name) html += `<p class="mt-4">📎 ${data.file_name}</p>`;
        html += `</div>`;
        resultDiv.innerHTML = html;
      } catch (err) {
        resultDiv.innerHTML = `<p class="text-red-600 text-center py-10">Code expired or not found</p>`;
      }
    }
  </script>
</body>
</html>
